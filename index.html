<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saqqa Search | Professional Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050811;
            --card-bg: #0d1221;
            --accent: #FFC107;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --tag-cheap: #22c55e;
            --tag-trend: #3b82f6;
            --tag-exclusive: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        /* Navigation */
        header {
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 8, 17, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 900; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--accent); }
        
        .admin-box { font-size: 13px; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; color: var(--accent); cursor: pointer; transition: 0.3s; }
        .admin-box:hover { background: var(--accent); color: #000; }

        /* Hero & Search */
        .hero { text-align: center; padding: 80px 5% 40px; background: radial-gradient(circle at center, #10182f 0%, var(--bg-dark) 100%); }
        .hero h1 { font-family: 'Montserrat', 'Cairo', sans-serif; font-size: clamp(32px, 6vw, 55px); margin-bottom: 20px; }
        .hero h1 span { color: var(--accent); text-shadow: 0 0 20px rgba(255, 193, 7, 0.3); }
        
        /* Filter Tabs */
        .filter-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 30px 0; }
        .filter-btn { 
            background: #111827; border: 1px solid #1e293b; color: #fff; padding: 10px 22px; 
            border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Products Grid */
        .container { max-width: 1300px; margin: 0 auto; padding: 20px 5% 80px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card { 
            background: var(--card-bg); border-radius: 24px; border: 1px solid #1e293b; 
            padding: 20px; position: relative; transition: 0.4s; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .badge { 
            position: absolute; top: 15px; left: 15px; padding: 4px 12px; 
            border-radius: 8px; font-size: 11px; font-weight: 800; z-index: 2;
        }
        .badge-cheap { background: var(--tag-cheap); color: #000; }
        .badge-trend { background: var(--tag-trend); color: #fff; }
        .badge-exclusive { background: var(--tag-exclusive); color: #000; }

        .product-icon { font-size: 50px; text-align: center; margin: 20px 0; background: #1a2238; padding: 20px; border-radius: 20px; }
        .card h3 { font-size: 18px; margin-bottom: 12px; min-height: 50px; }
        
        .price-area { margin-top: auto; padding-top: 15px; border-top: 1px solid #1e293b; }
        .p-price { font-size: 26px; font-weight: 900; color: var(--accent); }
        .p-old { text-decoration: line-through; color: var(--text-dim); font-size: 14px; margin-right: 8px; }

        .buy-now-btn { 
            width: 100%; padding: 14px; background: var(--accent); border: none; 
            border-radius: 14px; font-weight: 800; color: #000; cursor: pointer; 
            text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 8px;
            margin-top: 15px; transition: 0.3s;
        }
        .buy-now-btn:hover { background: #fff; transform: scale(1.02); }

        footer { text-align: center; padding: 60px; border-top: 1px solid #1e293b; color: var(--text-dim); }
        .owner { color: var(--accent); font-weight: 900; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">SAQQA <span>SEARCH</span></a>
        <div class="admin-box" onclick="checkAdmin()">لوحة الإدارة</div>
    </header>

    <section class="hero">
        <h1>Discover <span>Smart Deals</span></h1>
        <p>المنصة الاحترافية الأولى لمقارنة الصفقات والوصول المباشر لأفضل الأسعار العالمية.</p>
        
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterProducts('all', this)">الكل</button>
            <button class="filter-btn" onclick="filterProducts('tech', this)">تكنولوجيا</button>
            <button class="filter-btn" onclick="filterProducts('fashion', this)">ملابس</button>
            <button class="filter-btn" onclick="filterProducts('pets', this)">حيوانات أليفة</button>
            <button class="filter-btn" onclick="filterProducts('food', this)">طعام ومطبخ</button>
        </div>
    </section>

    <div class="container">
        <div class="grid" id="mainGrid">
            </div>
    </div>

    <footer>
        <p>Saqqa Search © 2026 | جميع الحقوق محفوظة</p>
        <p>Developed with Excellence by <a href="#" class="owner">Khaled Al-Saqqa</a></p>
    </footer>

    <script>
        // قاعدة بيانات المنتجات الاحترافية
        const products = [
            { name: "iPhone 15 Pro - 256GB", price: 999, old: 1100, cat: "tech", tag: "ترند الآن", tClass: "badge-trend", icon: "📱", link: "https://amazon.com" },
            { name: "سماعات Sony عازلة للضوضاء", price: 290, old: 350, cat: "tech", tag: "أرخص سعر", tClass: "badge-cheap", icon: "🎧", link: "https://sony.com" },
            { name: "جاكيت شتوي بريميوم - مقاوم للماء", price: 85, old: 150, cat: "fashion", tag: "تصفية كبرى", tClass: "badge-exclusive", icon: "🧥", link: "https://adidas.com" },
            { name: "جهاز ألعاب PlayStation 5", price: 499, old: 550, cat: "tech", tag: "حصرى وجديد", tClass: "badge-exclusive", icon: "🎮", link: "https://playstation.com" },
            { name: "طعام قطط رويال كانين 15kg", price: 45, old: 65, cat: "pets", tag: "أرخص جودة", tClass: "badge-cheap", icon: "🐈", link: "https://chewy.com" },
            { name: "طقم أواني مطبخ جرانيت 10 قطع", price: 120, old: 200, cat: "food", tag: "الأكثر مبيعاً", tClass: "badge-trend", icon: "🍳", link: "https://aliexpress.com" },
            { name: "ساعة ذكية Smart Watch S9", price: 55, old: 90, cat: "tech", tag: "ترند الآن", tClass: "badge-trend", icon: "⌚", link: "https://amazon.com" },
            { name: "حذاء رياضي Running Pro", price: 70, old: 120, cat: "fashion", tag: "لقطة حصري", tClass: "badge-exclusive", icon: "👟", link: "https://nike.com" }
        ];

        function filterProducts(category, btn) {
            // تحديث الأزرار
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const grid = document.getElementById('mainGrid');
            const filtered = category === 'all' ? products : products.filter(p => p.cat === category);

            grid.innerHTML = filtered.map(p => `
                <div class="card">
                    <div class="badge ${p.tClass}">${p.tag}</div>
                    <div class="product-icon">${p.icon}</div>
                    <h3>${p.name}</h3>
                    <div class="price-area">
                        <span class="p-old">$${p.old}</span>
                        <span class="p-price">$${p.price}</span>
                        <a href="${p.link}" target="_blank" class="buy-now-btn">
                            شراء من المصدر <i class="fa-solid fa-cart-shopping"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function checkAdmin() {
            const pass = prompt("أدخل إيميل الإدارة الخاص بك:");
            if(pass === "kaled847el19974@gmail.com") {
                alert("مرحباً بك يا خالد! لوحة التحكم قيد التحديث لربطها بـ Google Sheets.");
            } else {
                alert("عذراً، هذا الإيميل لا يملك صلاحيات.");
            }
        }

        // تشغيل العرض الأول
        filterProducts('all', document.querySelector('.filter-btn'));
    </script>
</body>
</html>
