<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saqqa Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0A0F1E; --card: #121829; --gold: #FFC107; --white: #FFFFFF; --muted: #A0A0A0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Cairo', sans-serif; line-height: 1.6; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(10,15,30,0.9); border-bottom: 1px solid #1f2937; position: sticky; top: 0; z-index: 1000; }
        .brand { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 800; color: white; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo-circle { background: var(--gold); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; }
        .hero { text-align: center; padding: 80px 5%; background: radial-gradient(circle at top, #161e35 0%, var(--bg) 80%); }
        .hero h1 { font-family: 'Montserrat', 'Cairo', sans-serif; font-size: clamp(30px, 5vw, 50px); margin-bottom: 15px; }
        .hero h1 span { color: var(--gold); }
        .search-box { max-width: 700px; margin: 30px auto; position: relative; }
        .search-input { width: 100%; padding: 20px 30px; border-radius: 50px; border: 2px solid #2a334d; background: #1A2136; color: white; font-size: 17px; outline: none; }
        .search-btn { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: var(--gold); border: none; padding: 12px 25px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .container { padding: 40px 5%; }
        .section-title { font-size: 24px; margin-bottom: 30px; border-right: 5px solid var(--gold); padding-right: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 50px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #1f2937; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .badge { position: absolute; top: 15px; left: 15px; background: var(--gold); color: black; padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        .price { font-size: 24px; color: var(--gold); font-weight: bold; margin: 15px 0; }
        .buy-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        footer { text-align: center; padding: 60px; border-top: 1px solid #1f2937; color: var(--muted); }
    </style>
</head>
<body>
    <header>
        <a class="brand" href="#"><div class="logo-circle"><i class="fas fa-bolt"></i></div> Saqqa Search</a>
        <div style="background:var(--gold); color:black; padding:8px 15px; border-radius:20px; font-weight:bold; cursor:pointer" onclick="alert('مرحباً بك يا خالد!')">دخول الإدارة</div>
    </header>
    <main>
        <section class="hero">
            <h1>Find the Best Price <br><span>Anywhere, Anytime.</span></h1>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="عن ماذا تبحث اليوم؟ (جوالات، ملابس، طعام حيوانات...)">
                <button class="search-btn" onclick="startSearch()">بحث</button>
            </div>
        </section>
        <div class="container">
            <h2 class="section-title">أرخص المنتجات وجودة عالية</h2>
            <div class="grid">
                <div class="card">
                    <div class="badge">توفير 40%</div>
                    <h3>سماعات لاسلكية برو</h3>
                    <p class="price">$35</p>
                    <button class="buy-btn">شراء الآن</button>
                </div>
                <div class="card">
                    <div class="badge">الأكثر طلباً</div>
                    <h3>شاحن سريع ذكي</h3>
                    <p class="price">$15</p>
                    <button class="buy-btn">شراء الآن</button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>Saqqa Search © 2026 | جميع الحقوق محفوظة</p>
        <p>Created by <span style="color:var(--gold)">Khaled Al-Saqqa from Gaza</span></p>
    </footer>
    <script>
        function startSearch() {
            const q = document.getElementById('searchInput').value;
            if(q) window.open(`https://www.google.com/search?tbm=shop&q=${encodeURIComponent(q)}`, '_blank');
        }
    </script>
</body>
</html>
